  <body>
    <noscript>
      <div
        style="
          max-width: 800px;
          margin: 0 auto;
          padding: 40px 20px;
          font-family: system-ui, sans-serif;
        "
      >
        <h1>Customly — Custom fashion su misura</h1>
        <p>
          Customly è una piattaforma italiana che connette clienti e customizer
          indipendenti per creare abbigliamento personalizzato.
        </p>
        <h2>Come funziona</h2>
        <ol>
          <li>
            Trova il customizer giusto tra i profili degli artigiani italiani.
          </li>
          <li>Configura il capo con il configuratore visivo.</li>
          <li>Invia il progetto e avvia la collaborazione.</li>
        </ol>
        <h2>Pagine</h2>
        <ul>
          <li><a href="/">Home</a></li>
          <li><a href="/configuratore">Configuratore</a></li>
          <li><a href="/creator">Customizer</a></li>
          <li><a href="/contatti">Contatti</a></li>
          <li><a href="/privacy">Privacy Policy</a></li>
          <li><a href="/terms">Termini e condizioni</a></li>
        </ul>
        <p>
          Per utilizzare pienamente la piattaforma, abilita JavaScript nel tuo
          browser.
        </p>
      </div>
    </noscript>
    <a href="#content" class="skip-link">Vai al contenuto</a>
    <div id="app"></div>
    <div
      aria-live="polite"
      aria-atomic="true"
      class="sr-only"
      id="aria-live-region"
    ></div>
    <script type="module">
      import { route, init, afterRender } from "./utils/router.js";
      import { renderNav, initNav, reinitNav } from "./components/navbar.js";
      import { renderFooter } from "./components/footer.js";
      import { renderHome, initHome } from "./pages/home.js";
      import {
        renderConfiguratore,
        initConfiguratore,
      } from "./pages/configuratore.js";
      import { renderVenditori, initVenditori } from "./pages/venditori.js";
      import { renderContatti, initContatti } from "./pages/contatti.js";
      import { renderCreator, initCreator } from "./pages/creator.js";
      import { renderTerms } from "./pages/terms.js";
      import { renderPrivacy } from "./pages/privacy.js";

      function wrap(html, initFn) {
        return (ctx) => {
          window._pageInit = initFn;
          const content = typeof html === "function" ? html(ctx) : html;
          return (
            renderNav() +
            `<main id="content" tabindex="-1">${content}</main>` +
            renderFooter()
          );
        };
      }

      route("/", wrap(renderHome(), initHome));
      route("/configuratore", wrap(renderConfiguratore(), initConfiguratore));
      route("/venditore", wrap(renderConfiguratore(), initConfiguratore));
      route("/venditori", wrap(renderVenditori(), initVenditori));
      route("/contatti", wrap(renderContatti(), initContatti));
      route("/creator", wrap(renderCreator, initCreator));
      route("/creator/", wrap(renderCreator, initCreator));
      route("/creator/:id", wrap(renderCreator, initCreator));
      route("/terms", wrap(renderTerms));
      route("/privacy", wrap(renderPrivacy));

      init(document.getElementById("app"));
      initNav();
      afterRender(reinitNav);
    </script>
  </body>
</html>
