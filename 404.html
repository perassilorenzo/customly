<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <title>Reindirizzamento...</title>
    <script>
      var l = window.location;
      var p = l.pathname;
      var parts = p.split("/");
      var base = "/" + (parts[1] || "") + "/";
      var qs = new URLSearchParams(l.search);
      if (qs.has("p")) {
        l.replace(base);
      } else {
        l.replace(base + "?p=" + encodeURIComponent(p));
      }
    </script>
  </head>
  <body></body>
</html>
